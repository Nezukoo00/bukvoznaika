services:
  postgres:
    image: postgres:16-alpine
    container_name: bukvoznaika_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bukvoznaika
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bukvoznaika2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bukvoznaika_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bukvoznaika
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-bukvoznaika2024}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_jwt}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    command: sh -c "node src/migrations/run.js && node src/server.js"

  frontend:
    build: ./frontend
    container_name: bukvoznaika_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:80"

volumes:
  pgdata:
